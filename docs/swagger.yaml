openapi: 3.1.0
info:
  title: Dokumentasi API Kesehatan Cipicung
  description: Dokumentasi REST API untuk Sistem Pendataan Kesehatan Posyandu Cipicung
servers:
  - url: http://localhost:3000/api/v1
    description: Development
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful.
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed.
        errors:
          type: array
          items:
            type: object
    Posyandu:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kode:
          type: string
          example: "POS-001"
        nama:
          type: string
          example: "Posyandu Cipicung"
        alamat:
          type: string
          example: "Jl. Cipicung No. 123"
        kelurahan:
          type: string
          example: "Cipicung"
        kecamatan:
          type: string
          example: "Coblong"
        kabupaten:
          type: string
          example: "Bandung"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Warga:
      type: object
      properties:
        id:
          type: string
          format: uuid
        posyandu_id:
          type: string
          format: uuid
        nomor:
          type: string
          example: "NO-001"
        nik:
          type: string
          example: "3201010101010001"
        nama:
          type: string
          example: "Budi Santoso"
        jenis_kelamin:
          type: string
          enum: [L, P]
        tanggal_lahir:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PemeriksaanBalita:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warga_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        bb:
          type: number
          example: 12.5
        tb:
          type: number
          example: 85.2
        lingkar_kepala:
          type: number
          example: 45.1
        lingkar_lengan_atas:
          type: number
          example: 15.3
        nama_ortu:
          type: string
          example: "Siti Aminah"
        tanggal_kunjungan:
          type: string
          format: date
          example: "2026-07-05"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PemeriksaanBumil:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warga_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        bb:
          type: number
          example: 12.5
        tb:
          type: number
          example: 85.2
        lingkar_perut:
          type: number
          example: 95.0
        lingkar_lengan_atas:
          type: number
          example: 15.3
        usia_kehamilan_minggu:
          type: integer
          example: 24
        hpht:
          type: string
          format: date
          example: "2026-01-15"
        htp:
          type: string
          format: date
          example: "2026-10-22"
        tekanan_darah_sistolik:
          type: integer
          example: 120
        tekanan_darah_diastolik:
          type: integer
          example: 80
        tinggi_fundus:
          type: number
          example: 24.5
        denyut_jantung_janin:
          type: integer
          example: 140
        hemoglobin:
          type: number
          example: 11.5
        keluhan:
          type: string
          example: "Mual di pagi hari"
        tanggal_kunjungan:
          type: string
          format: date
          example: "2026-07-05"
    PemeriksaanPascaPersalinan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warga_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        tanggal_persalinan:
          type: string
          format: date
          example: "2026-06-30"
        bb:
          type: number
          example: 12.5
        tekanan_darah_sistolik:
          type: integer
          example: 120
        tekanan_darah_diastolik:
          type: integer
          example: 80
        suhu_tubuh:
          type: number
          example: 36.5
        kondisi_ibu:
          type: string
          example: "Sehat"
        keluhan:
          type: string
          example: "Mual di pagi hari"
        tanggal_kunjungan:
          type: string
          format: date
          example: "2026-07-05"
    PemeriksaanLansia:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warga_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        bb:
          type: number
          example: 12.5
        tb:
          type: number
          example: 85.2
        tekanan_darah_sistolik:
          type: integer
          example: 120
        tekanan_darah_diastolik:
          type: integer
          example: 80
        gula_darah_sewaktu:
          type: integer
          example: 110
        keluhan:
          type: string
          example: "Mual di pagi hari"
        tanggal_kunjungan:
          type: string
          format: date
          example: "2026-07-05"
    RiwayatImunisasi:
      type: object
      properties:
        id:
          type: string
          format: uuid
        warga_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        jenis_vaksin:
          type: string
          example: "BCG"
        tanggal_pemberian:
          type: string
          format: date
          example: "2026-07-05"
    PendataanBulanan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        posyandu_id:
          type: string
          format: uuid
        kategori:
          type: string
          enum: [balita, imunisasi, bumil, pasca_persalinan, lansia]
        bulan:
          type: integer
        tahun:
          type: integer
        status:
          type: string
          enum: [draft, selesai]
        submitted_at:
          type: string
          format: date-time
        submitted_by:
          type: string
          format: uuid
    DashboardResponse:
      type: object
      properties:
        total_warga:
          type: integer
          example: 512
        total_balita:
          type: integer
          example: 84
        total_bumil:
          type: integer
          example: 17
        total_lansia:
          type: integer
          example: 63
        pendataan:
          type: object
          properties:
            balita:
              type: string
              example: selesai
            imunisasi:
              type: string
              example: draft
            bumil:
              type: string
              example: selesai
            pasca_persalinan:
              type: string
              example: draft
            lansia:
              type: string
              example: selesai
tags:
  - name: Authentication
  - name: Posyandu
  - name: Warga
  - name: Balita
  - name: Imunisasi
  - name: Bumil
  - name: Pasca Persalinan
  - name: Lansia
  - name: Pendataan Bulanan
  - name: Dashboard
paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login using Supabase Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: kader@cipicung.com
                password:
                  type: string
                  example: kader123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Operation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /posyandu:
    get:
      tags:
        - Posyandu
      summary: Get list of Posyandu
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags:
        - Posyandu
      summary: Add new Posyandu
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Posyandu'
      responses:
        '201':
          description: Created
  /posyandu/{id}:
    get:
      tags:
        - Posyandu
      summary: Get Posyandu details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
    put:
      tags:
        - Posyandu
      summary: Edit Posyandu
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Posyandu'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Posyandu
      summary: Delete Posyandu
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /warga:
    get:
      tags:
        - Warga
      summary: Get list of Warga
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: jenis_kelamin
          in: query
          schema:
            type: string
            enum: [L, P]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags:
        - Warga
      summary: Add new Warga
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Warga'
      responses:
        '201':
          description: Warga created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /warga/{id}:
    get:
      tags:
        - Warga
      summary: Get Warga details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Not found
    put:
      tags:
        - Warga
      summary: Edit Warga
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Warga'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags:
        - Warga
      summary: Delete Warga
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /balita:
    get:
      tags:
        - Balita
      summary: List balita checkups
      security:
        - BearerAuth: []
      parameters:
        - name: bulan
          in: query
          schema:
            type: integer
        - name: tahun
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
    post:
      tags:
        - Balita
      summary: Add balita checkup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanBalita'
      responses:
        '201':
          description: Created
        '409':
          description: Pendataan is locked
  /balita/{id}:
    get:
      tags:
        - Balita
      summary: Checkup details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
    put:
      tags:
        - Balita
      summary: Edit checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanBalita'
      responses:
        '200':
          description: Updated
        '409':
          description: Locked
    delete:
      tags:
        - Balita
      summary: Delete checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
        '409':
          description: Locked
  /balita/{wargaId}/history:
    get:
      tags:
        - Balita
      summary: Get checkup history for a citizen
      security:
        - BearerAuth: []
      parameters:
        - name: wargaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
  /imunisasi:
    get:
      tags:
        - Imunisasi
      summary: List immunizations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      tags:
        - Imunisasi
      summary: Add immunization record
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiwayatImunisasi'
      responses:
        '201':
          description: Created
        '409':
          description: Locked
  /imunisasi/{id}:
    get:
      tags:
        - Imunisasi
      summary: Immunization details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
    put:
      tags:
        - Imunisasi
      summary: Edit immunization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiwayatImunisasi'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Imunisasi
      summary: Delete immunization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /imunisasi/{wargaId}/history:
    get:
      tags:
        - Imunisasi
      summary: Get immunization history
      security:
        - BearerAuth: []
      parameters:
        - name: wargaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
  /bumil:
    get:
      tags:
        - Bumil
      summary: List bumil checkups
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      tags:
        - Bumil
      summary: Add bumil checkup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanBumil'
      responses:
        '201':
          description: Created
        '409':
          description: Locked
  /bumil/{id}:
    get:
      tags:
        - Bumil
      summary: Checkup details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
    put:
      tags:
        - Bumil
      summary: Edit checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
