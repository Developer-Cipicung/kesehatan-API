        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanPascaPersalinan'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Pasca Persalinan
      summary: Delete checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /pasca-persalinan/{wargaId}/history:
    get:
      tags:
        - Pasca Persalinan
      summary: Get checkup history
      security:
        - BearerAuth: []
      parameters:
        - name: wargaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
  /lansia:
    get:
      tags:
        - Lansia
      summary: List lansia checkups
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      tags:
        - Lansia
      summary: Add checkup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanLansia'
      responses:
        '201':
          description: Created
  /lansia/{id}:
    get:
      tags:
        - Lansia
      summary: Checkup details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
    put:
      tags:
        - Lansia
      summary: Edit checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanLansia'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Lansia
      summary: Delete checkup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /lansia/{wargaId}/history:
    get:
      tags:
        - Lansia
      summary: Get checkup history
      security:
        - BearerAuth: []
      parameters:
        - name: wargaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
  /pendataan-bulanan:
    get:
      tags:
        - Pendataan Bulanan
      summary: Get status of a specific category
      security:
        - BearerAuth: []
      parameters:
        - name: kategori
          in: query
          required: true
          schema:
            type: string
            enum: [balita, imunisasi, bumil, pasca_persalinan, lansia]
        - name: bulan
          in: query
          required: true
          schema:
            type: integer
        - name: tahun
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /pendataan-bulanan/status:
