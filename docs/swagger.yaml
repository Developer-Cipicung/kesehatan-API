          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
  /pasca-persalinan:
    get:
      tags:
        - Pasca Persalinan
      summary: List pasca persalinan checkups
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      tags:
        - Pasca Persalinan
      summary: Add checkup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PemeriksaanPascaPersalinan'
      responses:
        '201':
          description: Created
  /pasca-persalinan/{id}:
    get:
      tags:
        - Pasca Persalinan
      summary: Checkup details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
